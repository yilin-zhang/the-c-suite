name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v4

      - name: Run tests
        run: uv run --with pytest --with pyyaml pytest tests/ -v

      - name: Run plugin CI scripts
        run: |
          for ci in marketplace/plugins/*/ci.sh; do
            [ -f "$ci" ] || continue
            echo "--- Running $(dirname $ci | xargs basename) CI ---"
            bash "$ci"
          done
